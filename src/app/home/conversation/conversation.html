<div class="conversation-screen">

  <!-- Messages -->
  <div class="messages-container"
       role="log"
       aria-label="Conversation messages"
       aria-live="polite">

    @for (message of conversation().messages; track message.id) {

      @if (message.role === 'user') {
        <div class="message message--user">
          <div class="message-bubble">{{ message.content }}</div>
          <div class="user-avatar" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <circle cx="9" cy="6" r="3.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M2.5 17c0-3.59 2.91-6.5 6.5-6.5s6.5 2.91 6.5 6.5"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      } @else {
        <div class="message message--assistant">
          <div class="assistant-avatar" aria-hidden="true">
            <img ngSrc="/images/angular-ai-course-logo.png" alt="" fill>
          </div>
          <div class="message-card">{{ message.content }}</div>
        </div>
      }

    }

  </div>

  <!-- Input bar -->
  <div class="bottom-bar">
    <div class="chat-input-box" role="search">
      <svg class="input-search-icon" width="18" height="18" viewBox="0 0 18 18"
           fill="none" aria-hidden="true">
        <circle cx="7.5" cy="7.5" r="5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="11.5" y1="11.5" x2="15.5" y2="15.5"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text"
             class="chat-input"
             placeholder="Ask anything..."
             [value]="inputValue()"
             (input)="onInputChange($event)"
             (keydown)="handleKeyDown($event)"
             aria-label="Ask anything">
      <button class="send-btn"
              (click)="send()"
              [disabled]="!inputValue().trim()"
              aria-label="Send message">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <line x1="9" y1="14" x2="9" y2="4"
                stroke="white" stroke-width="2" stroke-linecap="round"/>
          <polyline points="5,8 9,4 13,8"
                    stroke="white" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <p class="input-disclaimer">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M7 1L1 12h12L7 1z" stroke="currentColor" stroke-width="1.2"
              stroke-linejoin="round"/>
        <line x1="7" y1="6" x2="7" y2="9" stroke="currentColor" stroke-width="1.2"
              stroke-linecap="round"/>
        <circle cx="7" cy="10.5" r="0.6" fill="currentColor"/>
      </svg>
      Give our AI as much context as possible, to get the best results.
      If an error occurs, please try again after a few seconds.
    </p>
  </div>

</div>
