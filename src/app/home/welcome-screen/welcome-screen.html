<div class="welcome-screen">

  <div class="logo-container">
    <img ngSrc="/images/angular-ai-course-logo.png"
         alt="Angular AI In Depth"
         fill
         priority>
  </div>

  <p class="welcome-title">
    Angular <span class="welcome-title-accent">AI</span> In Depth
  </p>

  <div class="input-wrapper">
    <div class="chat-input-box" role="search">
      <svg class="input-search-icon" width="18" height="18" viewBox="0 0 18 18"
           fill="none" aria-hidden="true">
        <circle cx="7.5" cy="7.5" r="5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="11.5" y1="11.5" x2="15.5" y2="15.5"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text"
             class="chat-input"
             placeholder="Ask anything..."
             [value]="inputValue()"
             (input)="onInputChange($event)"
             (keydown)="handleKeyDown($event)"
             aria-label="Ask anything">
      <button class="send-btn"
              (click)="send()"
              [disabled]="!inputValue().trim()"
              aria-label="Send message">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <line x1="9" y1="14" x2="9" y2="4"
                stroke="white" stroke-width="2" stroke-linecap="round"/>
          <polyline points="5,8 9,4 13,8"
                    stroke="white" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

</div>
