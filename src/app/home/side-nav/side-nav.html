<nav
  class="side-nav"
  [class.collapsed]="collapsed()"
  aria-label="Main navigation">

  <div class="nav-header">
    @if (collapsed()) {
      <button
        class="icon-btn"
        (click)="collapseToggle.emit()"
        aria-label="Expand sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 3v18"/>
        </svg>
      </button>
      <button class="icon-btn logo-btn" (click)="newChat.emit()" aria-label="Home">
        <img
          ngSrc="/images/angular-university-logo.svg"
          width="28"
          height="28"
          alt="Angular University"
          priority>
      </button>
      <button class="icon-btn" (click)="newChat.emit()" aria-label="New chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
      <button class="icon-btn" aria-label="Search in chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
    } @else {
      <div class="logo-row">
        <img
          ngSrc="/images/angular-university-logo.svg"
          width="36"
          height="36"
          alt="Angular University"
          priority
          class="logo-img">
        <button
          class="icon-btn"
          (click)="collapseToggle.emit()"
          aria-label="Collapse sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M9 3v18"/>
          </svg>
        </button>
      </div>
    }
  </div>

  @if (!collapsed()) {
    <div class="nav-actions">
      <button class="nav-action-btn" (click)="newChat.emit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        <span>New Chat</span>
      </button>
      <button class="nav-action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <span>Search in Chat</span>
      </button>
    </div>

    <div class="nav-content">
      <chat-history
        [conversations]="conversations()"
        [activeConversationId]="activeConversationId()"
        (conversationSelect)="conversationSelect.emit($event)">
      </chat-history>
    </div>
  }

  <div class="nav-footer">
    <button
      class="icon-btn logout-btn"
      (click)="logout.emit()"
      aria-label="Logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      @if (!collapsed()) {
        <span class="logout-label">Logout</span>
      }
    </button>
  </div>
</nav>
