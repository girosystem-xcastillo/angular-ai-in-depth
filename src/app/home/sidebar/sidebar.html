<aside class="sidebar" [class.sidebar--collapsed]="collapsed()" aria-label="Chat navigation">

  <!-- Header: brand + toggle -->
  <div class="sidebar-header">
    @if (!collapsed()) {
      <div class="sidebar-brand">
        <img ngSrc="/images/angular-ai-course-logo.png"
             alt="Angular AI In Depth"
             width="52" height="35">
      </div>
    } @else {
      <div class="sidebar-brand-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <polygon points="11,1 20,5.5 20,16.5 11,21 2,16.5 2,5.5" fill="#e91e8c"/>
          <polygon points="11,1 20,5.5 20,16.5 11,21" fill="rgba(0,0,0,0.15)"/>
          <polyline points="7,16 11,6 15,16" stroke="white" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="8.5" y1="13" x2="13.5" y2="13" stroke="white"
                stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
    }
    <button class="icon-btn toggle-btn"
            (click)="toggleCollapse()"
            [attr.aria-label]="collapsed() ? 'Expand sidebar' : 'Collapse sidebar'">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <rect x="2" y="2" width="16" height="16" rx="2"
              stroke="currentColor" stroke-width="1.5"/>
        <line x1="7" y1="2" x2="7" y2="18"
              stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </button>
  </div>

  <!-- Navigation actions -->
  <nav class="sidebar-nav" aria-label="Chat actions">
    <button class="nav-btn" (click)="newChat()" aria-label="New chat">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M13 2.5l2.5 2.5-9 9L3 15l.5-3.5 9-9z"
              stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <line x1="11" y1="4.5" x2="13.5" y2="7"
              stroke="currentColor" stroke-width="1.5"/>
      </svg>
      @if (!collapsed()) {
        <span>New Chat</span>
      }
    </button>

    <button class="nav-btn" aria-label="Search in chat">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <circle cx="7.5" cy="7.5" r="5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="11.5" y1="11.5" x2="15.5" y2="15.5"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      @if (!collapsed()) {
        <span>Search in Chat</span>
      }
    </button>
  </nav>

  <!-- Conversation history (only when expanded) -->
  @if (!collapsed()) {
    <chat-history
      [conversations]="conversations()"
      [activeConversationId]="activeConversationId()"
      (conversationSelected)="onConversationSelected($event)">
    </chat-history>
  }

  <!-- Logout -->
  <div class="sidebar-footer">
    <button class="icon-btn logout-btn" (click)="logout()" aria-label="Log out">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M8 3H4a1 1 0 00-1 1v12a1 1 0 001 1h4"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <polyline points="13,7 17,10 13,13"
                  stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="7" y1="10" x2="17" y2="10"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      @if (!collapsed()) {
        <span class="logout-label">Log out</span>
      }
    </button>
  </div>

</aside>
