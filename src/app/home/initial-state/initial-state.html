<div class="initial-state">
  <div class="hero">
    <img
      ngSrc="/images/angular-ai-course-logo.png"
      width="300"
      height="220"
      alt="Angular AI In Depth logo"
      priority
      class="hero-logo">
    <h1 class="hero-title">
      Angular <span class="accent">AI</span> In Depth
    </h1>
  </div>

  <div class="input-wrapper">
    <div class="input-bar" role="search">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21l-4.35-4.35"/>
      </svg>
      <input
        type="text"
        class="input-field"
        placeholder="Ask anything..."
        aria-label="Ask a question"
        [value]="messageText()"
        (input)="onInputChange($event)"
        (keydown)="onKeyDown($event)">
      <button
        class="submit-btn"
        aria-label="Send message"
        [disabled]="!messageText().trim()"
        (click)="submitMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
      </button>
    </div>
  </div>
</div>
